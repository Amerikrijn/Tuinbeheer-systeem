name: npm-audit

on:
  pull_request:
  schedule:
    - cron: "0 2 * * 1"  # Weekly on Monday at 2 AM

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=high

      - name: Check for known vulnerabilities
        run: |
          echo "Checking for high and critical vulnerabilities..."
          npm audit --audit-level=high --json > audit-results.json || true
          
          # Parse results and fail if high/critical vulnerabilities found
          if [ -f audit-results.json ]; then
            HIGH_COUNT=$(cat audit-results.json | jq '.metadata.vulnerabilities.high // 0')
            CRITICAL_COUNT=$(cat audit-results.json | jq '.metadata.vulnerabilities.critical // 0')
            
            echo "High vulnerabilities: $HIGH_COUNT"
            echo "Critical vulnerabilities: $CRITICAL_COUNT"
            
            if [ "$HIGH_COUNT" -gt 0 ] || [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "❌ High or critical vulnerabilities found!"
              exit 1
            fi
            
            echo "✅ No high or critical vulnerabilities found"
          fi